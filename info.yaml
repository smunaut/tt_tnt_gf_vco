# Tiny Tapeout project information
project:
  title:        "Quadrature VCO"
  author:       "Sylvain Munaut"
  discord:      "246tnt"
  description:  "Quadrature VCO with nominal target frequency of 240 MHz"
  language:     "Analog"
  clock_hz:     0

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"

  # How many analog pins does your project use?
  analog_pins: 3
  uses_vapwr: false

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_tnt_gf_vco"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:        
    - "tt_um_tnt_gf_vco.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "out_0"
  uo[1]: "out_270"
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins
  ua[0]: "out_180"
  ua[1]: "out_90"
  ua[2]: "control"
  ua[3]: ""
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
